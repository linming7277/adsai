name: Deploy Frontend (Cloud Run + Cloudflare)

on:
  push:
    branches: [ main, production ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO || 'autoads-services' }}
  ARTIFACT_LOCATION: ${{ vars.GCP_REGION }}

jobs:
  meta:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine.outputs.environment }}
      primary_tag: ${{ steps.determine.outputs.primary_tag }}
      secondary_tag: ${{ steps.determine.outputs.secondary_tag }}
      short_sha: ${{ steps.determine.outputs.short_sha }}
      target: ${{ steps.determine.outputs.target }}
    steps:
      - name: Determine environment, tags, hosting target
        id: determine
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          REF="$GITHUB_REF"
          if [[ "$REF" == refs/tags/* ]]; then
            ENVIRONMENT="prod"; TAG_NAME="${REF#refs/tags/}";
            PRIMARY_TAG="prod-${TAG_NAME}"; SECONDARY_TAG="prod-${SHORT_SHA}"; TARGET="autoads-prod"
          elif [[ "$REF" == "refs/heads/production" ]]; then
            ENVIRONMENT="prod"; PRIMARY_TAG="prod-${SHORT_SHA}"; SECONDARY_TAG="prod-latest"; TARGET="autoads-prod"
          else
            ENVIRONMENT="preview"; PRIMARY_TAG="preview-${SHORT_SHA}"; SECONDARY_TAG="preview-latest"; TARGET="autoads-preview"
          fi
          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "primary_tag=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
          echo "secondary_tag=${SECONDARY_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"

  lint-and-check:
    name: Lint and type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: |
          cd apps/frontend
          npm ci --no-audit --no-fund
      - name: Type check
        run: |
          cd apps/frontend
          npm run typecheck || echo "TypeScript errors present but allowing build to continue"
        continue-on-error: true
      - name: Build Storybook
        run: |
          cd apps/frontend
          npm run build-storybook
        continue-on-error: true

  build-image:
    name: Build frontend image (Cloud Build)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [meta, lint-and-check]
    outputs:
      build_id: ${{ steps.cb.outputs.build_id }}
      build_log_url: ${{ steps.cb.outputs.build_log_url }}
      image: ${{ steps.cb.outputs.image }}
      image_base: ${{ steps.cb.outputs.image_base }}
      image_digest: ${{ steps.cb.outputs.image_digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Create optimized frontend tarball
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="/tmp/frontend-source.tar.gz"

          echo "Creating frontend tarball (apps + packages + root package.json)"
          tar -czf "$TARBALL" \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='*.log' \
            --exclude='.firebase' \
            --exclude='makerkit' \
            --exclude='docs' \
            package.json package-lock.json apps/frontend packages

          TARBALL_SIZE=$(du -sh "$TARBALL" | cut -f1)
          echo "✅ Frontend tarball created: ${TARBALL_SIZE}"
          echo "tarball_path=$TARBALL" >> "$GITHUB_ENV"

      - name: Cloud Build submit
        id: cb
        shell: bash
        run: |
          set -euo pipefail
          AR_HOST="${ARTIFACT_LOCATION:-asia-northeast1}-docker.pkg.dev"
          IMAGE="${AR_HOST}/${PROJECT_ID}/${ARTIFACT_REPO}/frontend:${{ needs.meta.outputs.primary_tag }}"
          TARBALL="${{ env.tarball_path }}"

          echo "Submitting Cloud Build for ${IMAGE}"
          CONFIG_PATH="$GITHUB_WORKSPACE/deployments/cloudbuild/build-frontend-supabase.yaml"
          ls -l "$CONFIG_PATH" || { echo "Config not found at $CONFIG_PATH" >&2; exit 1; }

          # Determine site URL based on environment
          ENVIRONMENT='${{ needs.meta.outputs.environment }}'
          if [[ "$ENVIRONMENT" == "prod" ]]; then
            SITE_URL="https://www.autoads.dev"
          else
            SITE_URL="https://www.urlchecker.dev"
          fi

          echo "Building for environment: $ENVIRONMENT with site URL: $SITE_URL"
          BUILD_NAME=$(gcloud builds submit "$TARBALL" \
            --project "${PROJECT_ID}" \
            --config "$CONFIG_PATH" \
            --gcs-log-dir gs://autoads-build-logs-asia-northeast1/logs \
            --substitutions _IMAGE="${IMAGE}",_SITE_URL="${SITE_URL}",_ENVIRONMENT="${ENVIRONMENT}" \
            --async --format='value(name)')
          BUILD_ID="${BUILD_NAME##*/}"
          if [[ -z "$BUILD_ID" ]]; then echo "Failed to parse build id" >&2; exit 1; fi
          for i in $(seq 1 180); do
            STATUS=$(gcloud builds describe "$BUILD_ID" --project "$PROJECT_ID" --format='value(status)' || true)
            echo "Build $BUILD_ID status: $STATUS";
            case "$STATUS" in SUCCESS) break;; FAILURE|CANCELLED|TIMEOUT|EXPIRED) exit 1;; esac
            sleep 10; done
          # Resolve image base and digest for the tag
          IMAGE_BASE="${AR_HOST}/${PROJECT_ID}/${ARTIFACT_REPO}/frontend"
          TAG='${{ needs.meta.outputs.primary_tag }}'
          DIGEST=$(gcloud artifacts docker tags list "$IMAGE_BASE" --format='csv[no-heading](tag,digest)' \
            | awk -F, -v t="$TAG" '$1==t{print $2; exit}')
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "build_log_url=https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_base=$IMAGE_BASE" >> "$GITHUB_OUTPUT"
          echo "image_digest=${DIGEST:-}" >> "$GITHUB_OUTPUT"

  tag-image:
    name: Tag image (secondary)
    runs-on: ubuntu-latest
    needs: [meta, build-image]
    if: ${{ needs.meta.outputs.secondary_tag != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Add secondary tag
        shell: bash
        run: |
          set -euo pipefail
          AR_HOST="${ARTIFACT_LOCATION:-asia-northeast1}-docker.pkg.dev"
          IMAGE_BASE="${AR_HOST}/${PROJECT_ID}/${ARTIFACT_REPO}/frontend"
          gcloud container images add-tag \
            "${IMAGE_BASE}:${{ needs.meta.outputs.primary_tag }}" \
            "${IMAGE_BASE}:${{ needs.meta.outputs.secondary_tag }}" \
            --quiet --project "${PROJECT_ID}"

  deploy-cloudrun:
    name: Deploy Cloud Run frontend
    runs-on: ubuntu-latest
    needs: [meta, build-image]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Deploy service
        shell: bash
        run: |
          set -euo pipefail
          AR_HOST="${ARTIFACT_LOCATION:-asia-northeast1}-docker.pkg.dev"
          IMAGE="${AR_HOST}/${PROJECT_ID}/${ARTIFACT_REPO}/frontend:${{ needs.meta.outputs.primary_tag }}"

          # Determine service name based on environment
          ENVIRONMENT='${{ needs.meta.outputs.environment }}'
          if [[ "$ENVIRONMENT" == "prod" ]]; then
            SERVICE_NAME="frontend"
          else
            SERVICE_NAME="frontend-preview"
          fi

          echo "Deploying to Cloud Run service: ${SERVICE_NAME}"
          gcloud run deploy "${SERVICE_NAME}" \
            --image "$IMAGE" \
            --region "${REGION:-asia-northeast1}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "codex-dev@${PROJECT_ID}.iam.gserviceaccount.com" \
            --project "${PROJECT_ID}"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [meta, build-image, deploy-cloudrun]
    steps:
      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: false
      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v1
      - name: Summarize endpoints
        shell: bash
        run: |
          set -euo pipefail
          REGION="${{ env.REGION }}"; REGION="${REGION:-asia-northeast1}"
          ENVIRONMENT='${{ needs.meta.outputs.environment }}'

          # Determine service name based on environment
          if [[ "$ENVIRONMENT" == "prod" ]]; then
            SERVICE_NAME="frontend"
            TITLE="Production Deploy Summary"
            PUBLIC_URL="https://www.autoads.dev"
          else
            SERVICE_NAME="frontend-preview"
            TITLE="Preview Deploy Summary"
            PUBLIC_URL="https://www.urlchecker.dev"
          fi

          RUN_URL=$(gcloud run services describe "${SERVICE_NAME}" --region "$REGION" --format='value(status.url)' || true)
          REV_NAME=$(gcloud run services describe "${SERVICE_NAME}" --region "$REGION" --format='value(status.latestReadyRevisionName)' || true)
          IMAGE=$(gcloud run services describe "${SERVICE_NAME}" --region "$REGION" --format='value(spec.template.spec.containers[0].image)' || true)
          BUILD_ID='${{ needs.build-image.outputs.build_id }}'
          BUILD_LOG_URL='${{ needs.build-image.outputs.build_log_url }}'
          IMAGE_DIGEST='${{ needs.build-image.outputs.image_digest }}'
          {
            echo "## ${TITLE}"
            echo "- Environment: ${ENVIRONMENT}"
            echo "- Cloud Run Service: ${SERVICE_NAME}"
            echo "- Cloud Run Direct URL: ${RUN_URL:-N/A}"
            echo "- Public URL (via Cloudflare): ${PUBLIC_URL}"
            echo "- Cloud Run Revision: ${REV_NAME:-N/A}"
            echo "- Deployed Image: ${IMAGE:-N/A}"
            echo "- Image Digest: ${IMAGE_DIGEST:-N/A}"
            echo "- Build ID: ${BUILD_ID:-N/A}"
            echo "- Build Logs: ${BUILD_LOG_URL:-N/A}"
          } >> "$GITHUB_STEP_SUMMARY"
