steps:
  # 构建镜像
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/your-gcp-project-id/adsai-services/db-index-migrator:latest'
      - '-f'
      - 'database/optimizations/Dockerfile'
      - 'database/optimizations'

  # 推送镜像
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/your-gcp-project-id/adsai-services/db-index-migrator:latest'

  # 创建/更新Cloud Run Job
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run jobs create apply-performance-indexes \
          --image=asia-northeast1-docker.pkg.dev/your-gcp-project-id/adsai-services/db-index-migrator:latest \
          --region=asia-northeast1 \
          --set-secrets=DATABASE_URL=DATABASE_URL:latest \
          --vpc-connector=cr-conn-default-ane1 \
          --vpc-egress=private-ranges-only \
          --service-account=service-account@your-gcp-project-id.iam.gserviceaccount.com \
          --max-retries=0 \
          --task-timeout=10m \
          || \
        gcloud run jobs update apply-performance-indexes \
          --image=asia-northeast1-docker.pkg.dev/your-gcp-project-id/adsai-services/db-index-migrator:latest \
          --region=asia-northeast1

images:
  - 'asia-northeast1-docker.pkg.dev/your-gcp-project-id/adsai-services/db-index-migrator:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
