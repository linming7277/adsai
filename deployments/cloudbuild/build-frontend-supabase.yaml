timeout: "3600s"
serviceAccount: 'projects/your-gcp-project-id/serviceAccounts/service-account@your-gcp-project-id.iam.gserviceaccount.com'
options:
  logging: GCS_ONLY
  machineType: 'E2_HIGHCPU_8'
logsBucket: gs://adsai-build-logs-asia-northeast1/logs
substitutions:
  _IMAGE: "asia-northeast1-docker.pkg.dev/PROJECT/REPO/frontend:dev"
  _SITE_URL: "https://preview.example.com"
  _ENVIRONMENT: "preview"  # preview or prod
availableSecrets:
  secretManager:
  # Supabase配置
  - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_URL/versions/latest
    env: 'SUPABASE_URL'
  - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_ANON_KEY/versions/latest
    env: 'SUPABASE_ANON_KEY'
  - versionName: projects/$PROJECT_ID/secrets/SUPABASE_SERVICE_KEY/versions/latest
    env: 'SUPABASE_SERVICE_KEY'
  # Stripe配置
  - versionName: projects/$PROJECT_ID/secrets/STRIPE_PUBLISHABLE_KEY/versions/latest
    env: 'STRIPE_PUBLISHABLE_KEY'
  # API配置 - 环境专用
  - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_API_BASE_URL_PREVIEW/versions/latest
    env: 'API_BASE_URL_PREVIEW'
  - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_API_BASE_URL_PROD/versions/latest
    env: 'API_BASE_URL_PROD'
steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: Build frontend image
    secretEnv: ['SUPABASE_URL', 'SUPABASE_ANON_KEY', 'SUPABASE_SERVICE_KEY', 'STRIPE_PUBLISHABLE_KEY', 'API_BASE_URL_PREVIEW', 'API_BASE_URL_PROD']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Building for environment: ${_ENVIRONMENT}"

        # 根据环境选择对应的 API URL 并直接传递给 docker build
        if [[ "${_ENVIRONMENT}" == "prod" ]]; then
          echo "Using Production API URL"
          docker build \
            -f apps/frontend/Dockerfile \
            -t ${_IMAGE} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="$$SUPABASE_URL" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$$SUPABASE_ANON_KEY" \
            --build-arg SUPABASE_SERVICE_KEY="$$SUPABASE_SERVICE_KEY" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="$$STRIPE_PUBLISHABLE_KEY" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$$API_BASE_URL_PROD" \
            --build-arg NEXT_PUBLIC_SITE_URL="${_SITE_URL}" \
            .
        else
          echo "Using Preview API URL"
          docker build \
            -f apps/frontend/Dockerfile \
            -t ${_IMAGE} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="$$SUPABASE_URL" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$$SUPABASE_ANON_KEY" \
            --build-arg SUPABASE_SERVICE_KEY="$$SUPABASE_SERVICE_KEY" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="$$STRIPE_PUBLISHABLE_KEY" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$$API_BASE_URL_PREVIEW" \
            --build-arg NEXT_PUBLIC_SITE_URL="${_SITE_URL}" \
            .
        fi
images:
  - '${_IMAGE}'
