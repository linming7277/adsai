substitutions:
  _SERVICE: frontend-preview
  _REGION: asia-northeast1
  _IMAGE: asia-northeast1-docker.pkg.dev/$PROJECT_ID/adsai-services/frontend:preview-v3

steps:
  - name: gcr.io/cloud-builders/docker
    dir: apps/frontend
    args:
      - build
      - -f
      - Dockerfile
      - -t
      - ${_IMAGE}
      - .

  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated

images:
  - ${_IMAGE}
