# Template for comprehensive Secret Manager integration in Cloud Build
# This template ensures all services have access to required environment variables
# Usage: Copy and modify for specific service builds

timeout: "3600s"
serviceAccount: 'projects/your-gcp-project-id/serviceAccounts/service-account@your-gcp-project-id.iam.gserviceaccount.com'
options:
  logging: GCS_ONLY
  machineType: 'E2_HIGHCPU_8'
  logsBucket: gs://adsai-build-logs-asia-northeast1/logs

# Common substitutions for all builds
substitutions:
  _IMAGE: "asia-northeast1-docker.pkg.dev/PROJECT/REPO/SERVICE:dev"
  _ENVIRONMENT: "preview"  # preview or prod

# Comprehensive Secret Manager access for all required secrets
availableSecrets:
  secretManager:
    # Database & Redis
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: 'DATABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/REDIS_URL/versions/latest
      env: 'REDIS_URL'
    - versionName: projects/$PROJECT_ID/secrets/VALKEY_URL/versions/latest
      env: 'VALKEY_URL'
    - versionName: projects/$PROJECT_ID/secrets/READ_REPLICA_URL/versions/latest
      env: 'READ_REPLICA_URL'

    # Supabase Configuration
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_URL/versions/latest
      env: 'SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_ANON_KEY/versions/latest
      env: 'SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_SERVICE_KEY/versions/latest
      env: 'SUPABASE_SERVICE_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_ACCESS_TOKEN/versions/latest
      env: 'SUPABASE_ACCESS_TOKEN'

    # API & Service URLs
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_API_BASE_URL_PREVIEW/versions/latest
      env: 'API_BASE_URL_PREVIEW'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_API_BASE_URL_PROD/versions/latest
      env: 'API_BASE_URL_PROD'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_API_BASE_URL/versions/latest
      env: 'NEXT_PUBLIC_API_BASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SITE_URL/versions/latest
      env: 'SITE_URL'

    # Authentication & Security
    - versionName: projects/$PROJECT_ID/secrets/INTERNAL_SERVICE_TOKEN/versions/latest
      env: 'INTERNAL_SERVICE_TOKEN'
    - versionName: projects/$PROJECT_ID/secrets/INTERNAL_JWT_SECRET/versions/latest
      env: 'JWT_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/OAUTH_STATE_SECRET/versions/latest
      env: 'OAUTH_STATE_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/REFRESH_TOKEN_ENC_KEY_B64/versions/latest
      env: 'REFRESH_TOKEN_ENC_KEY'

    # Admin & Policy
    - versionName: projects/$PROJECT_ID/secrets/ADMIN_POLICY/versions/latest
      env: 'ADMIN_POLICY'
    - versionName: projects/$PROJECT_ID/secrets/SUPER_ADMIN_EMAIL/versions/latest
      env: 'SUPER_ADMIN_EMAIL'

    # Stripe Configuration
    - versionName: projects/$PROJECT_ID/secrets/STRIPE_PUBLISHABLE_KEY/versions/latest
      env: 'STRIPE_PUBLISHABLE_KEY'
    - versionName: projects/$PROJECT_ID/secrets/STRIPE_SECRET_KEY/versions/latest
      env: 'STRIPE_SECRET_KEY'
    - versionName: projects/$PROJECT_ID/secrets/STRIPE_WEBHOOK_SECRET_PREVIEW/versions/latest
      env: 'STRIPE_WEBHOOK_SECRET_PREVIEW'
    - versionName: projects/$PROJECT_ID/secrets/STRIPE_WEBHOOK_SECRET_PRODUCTION/versions/latest
      env: 'STRIPE_WEBHOOK_SECRET_PROD'

    # Google Ads Configuration
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_ADS_DEVELOPER_TOKEN/versions/latest
      env: 'GOOGLE_ADS_DEVELOPER_TOKEN'
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_ADS_OAUTH_CLIENT_ID/versions/latest
      env: 'GOOGLE_ADS_OAUTH_CLIENT_ID'
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_ADS_OAUTH_CLIENT_SECRET/versions/latest
      env: 'GOOGLE_ADS_OAUTH_CLIENT_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/ADS_OAUTH_REDIRECT_URL/versions/latest
      env: 'ADS_OAUTH_REDIRECT_URL'
    - versionName: projects/$PROJECT_ID/secrets/ADS_OAUTH_REDIRECT_URLS/versions/latest
      env: 'ADS_OAUTH_REDIRECT_URLS'

    # Third-party Services
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SIMILARWEB_BASE_URL/versions/latest
      env: 'SIMILARWEB_BASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/PROXY_URLS/versions/latest
      env: 'PROXY_URLS'

steps:
  # Example build step for Go services
  - name: 'golang:1.25'
    id: Build Go Service
    secretEnv: [
      'DATABASE_URL', 'REDIS_URL', 'VALKEY_URL', 'SUPABASE_SERVICE_KEY',
      'INTERNAL_SERVICE_TOKEN', 'JWT_SECRET', 'OAUTH_STATE_SECRET',
      'ADMIN_POLICY', 'SUPER_ADMIN_EMAIL'
    ]
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Building Go service with comprehensive Secret Manager access"
        echo "Environment: ${_ENVIRONMENT}"

        # Set build-time variables
        export CGO_ENABLED=0
        export GOOS=linux
        export GOWORK=off

        # Build the service
        go mod tidy
        go build -trimpath -ldflags='-s -w' -o /service .

        echo "Build completed successfully"

  # Example build step for Node.js/Next.js services
  - name: 'gcr.io/cloud-builders/docker'
    id: Build Node.js Service
    secretEnv: [
      'SUPABASE_URL', 'SUPABASE_ANON_KEY', 'SUPABASE_SERVICE_KEY',
      'API_BASE_URL_PREVIEW', 'API_BASE_URL_PROD', 'NEXT_PUBLIC_API_BASE_URL',
      'SITE_URL', 'STRIPE_PUBLISHABLE_KEY'
    ]
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Building Node.js service with comprehensive Secret Manager access"
        echo "Building for environment: ${_ENVIRONMENT}"

        # 根据环境选择对应的 API URL
        if [[ "${_ENVIRONMENT}" == "prod" ]]; then
          PROD_API_URL="$$API_BASE_URL_PROD"
          echo "Using Production API URL: $PROD_API_URL"
          docker build \
            -f Dockerfile \
            -t ${_IMAGE} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="$$SUPABASE_URL" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$$SUPABASE_ANON_KEY" \
            --build-arg SUPABASE_SERVICE_KEY="$$SUPABASE_SERVICE_KEY" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="$$STRIPE_PUBLISHABLE_KEY" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$PROD_API_URL" \
            --build-arg NEXT_PUBLIC_SITE_URL="$$SITE_URL" \
            .
        else
          PREVIEW_API_URL="$$API_BASE_URL_PREVIEW"
          echo "Using Preview API URL: $PREVIEW_API_URL"
          docker build \
            -f Dockerfile \
            -t ${_IMAGE} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="$$SUPABASE_URL" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$$SUPABASE_ANON_KEY" \
            --build-arg SUPABASE_SERVICE_KEY="$$SUPABASE_SERVICE_KEY" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="$$STRIPE_PUBLISHABLE_KEY" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$PREVIEW_API_URL" \
            --build-arg NEXT_PUBLIC_SITE_URL="$$SITE_URL" \
            .
        fi

images:
  - '${_IMAGE}'

# Service deployment configuration template
# To be used with Cloud Run deployment scripts
deployment:
  cloudRun:
    environmentVariables:
      # Project Configuration
      - name: GOOGLE_CLOUD_PROJECT
        value: "your-gcp-project-id"
      - name: DB_NAME
        value: "shared_db"

      # Service URLs (internal networking)
      - name: BILLING_SERVICE_URL
        value: "http://billing:8080"
      - name: OFFER_SERVICE_URL
        value: "http://offer:8080"
      - name: CONSOLE_SERVICE_URL
        value: "http://console:8080"
      - name: MANAGE_BASE_URL
        value: "https://www.example.com/manage"

    secretEnvironmentVariables:
      # Database & Cache
      - name: DATABASE_URL
        secret: DATABASE_URL
      - name: REDIS_URL
        secret: REDIS_URL
      - name: VALKEY_URL
        secret: VALKEY_URL

      # Supabase Configuration
      - name: SUPABASE_URL
        secret: NEXT_PUBLIC_SUPABASE_URL
      - name: SUPABASE_SERVICE_KEY
        secret: SUPABASE_SERVICE_KEY

      # Authentication & Security
      - name: INTERNAL_SERVICE_TOKEN
        secret: INTERNAL_SERVICE_TOKEN
      - name: ADMIN_POLICY
        secret: ADMIN_POLICY
      - name: SUPER_ADMIN_EMAIL
        secret: SUPER_ADMIN_EMAIL

      # API Configuration
      - name: API_BASE_URL
        secret: NEXT_PUBLIC_API_BASE_URL

      # Third-party Services
      - name: STRIPE_PUBLISHABLE_KEY
        secret: STRIPE_PUBLISHABLE_KEY
      - name: GEMINI_API_KEY
        secret: GEMINI_API_KEY