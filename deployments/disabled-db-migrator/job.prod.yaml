apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: db-migrator-prod
  labels:
    component: db-migrator
    environment: prod
  annotations:
    run.googleapis.com/vpc-access-connector: projects/gen-lang-client-0944935873/locations/asia-northeast1/connectors/cr-conn-default-ane1
    run.googleapis.com/vpc-access-egress: all-traffic
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/vpc-access-connector: projects/gen-lang-client-0944935873/locations/asia-northeast1/connectors/cr-conn-default-ane1
        run.googleapis.com/vpc-access-egress: all-traffic
    spec:
      template:
        spec:
          serviceAccountName: codex-dev@gen-lang-client-0944935873.iam.gserviceaccount.com
          containers:
          - name: db-migrator
            image: asia-northeast1-docker.pkg.dev/gen-lang-client-0944935873/autoads-services/db-migrator:prod-latest
            env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            - name: SCHEMAS_DIR
              value: /app/schemas/sql
            resources:
              limits:
                cpu: "1"
                memory: 512Mi
          timeoutSeconds: 600
          maxRetries: 1
