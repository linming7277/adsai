version: "002"
service: "offer"
description: "添加演示数据支持字段 - 为OfferStatusHistory和OfferKpiDeadLetter表添加is_demo字段"
author: "system-migration"
created_at: "2025-01-19T12:00:00Z"
risk_level: "low"
dependencies:
  - "001"

changes:
  - type: "ALTER_TABLE"
    name: "OfferStatusHistory"
    sql: |
      ALTER TABLE "OfferStatusHistory" ADD COLUMN IF NOT EXISTS is_demo BOOLEAN DEFAULT FALSE;
    description: "为offer状态历史添加演示数据标记字段"

  - type: "ALTER_TABLE"
    name: "OfferKpiDeadLetter"
    sql: |
      ALTER TABLE "OfferKpiDeadLetter" ADD COLUMN IF NOT EXISTS is_demo BOOLEAN DEFAULT FALSE;
    description: "为KPI死信队列添加演示数据标记字段"

rollback:
