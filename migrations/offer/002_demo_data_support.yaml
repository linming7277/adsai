    sql: |
      ALTER TABLE "OfferStatusHistory" DROP COLUMN IF EXISTS is_demo;
    description: "回滚：删除OfferStatusHistory表的is_demo字段"

  - type: "DROP_COLUMN"
    name: "OfferKpiDeadLetter"
    column: "is_demo"
    sql: |
      ALTER TABLE "OfferKpiDeadLetter" DROP COLUMN IF EXISTS is_demo;
    description: "回滚：删除OfferKpiDeadLetter表的is_demo字段"

validation:
  - type: "column_exists"
    name: "OfferStatusHistory"
    column: "is_demo"
    description: "验证OfferStatusHistory表的is_demo字段已添加"

  - type: "column_exists"
    name: "OfferKpiDeadLetter"
    column: "is_demo"
    description: "验证OfferKpiDeadLetter表的is_demo字段已添加"

  - type: "data_type_check"
    name: "OfferStatusHistory"
    column: "is_demo"
    expected_type: "boolean"
    description: "验证is_demo字段数据类型为boolean"

  - type: "data_type_check"
    name: "OfferKpiDeadLetter"
    column: "is_demo"
    expected_type: "boolean"
    description: "验证is_demo字段数据类型为boolean"