swagger: "2.0"
info:
  title: adsai-gateway-v2
  version: 2.0.0
schemes:
  - https
produces:
  - application/json
securityDefinitions:
  firebase:
    type: oauth2
    flow: "implicit"
    authorizationUrl: ""
    x-google-issuer: "https://securetoken.google.com/your-gcp-project-id"
    x-google-jwks_uri: "https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com"
    x-google-audiences: "your-gcp-project-id"
paths:
  /readyz:
    get:
      operationId: readyz
      # point to one lightweight service health endpoint
      x-google-backend:
        address: https://console-preview-yt54xvsg5q-an.a.run.app/health
        path_translation: CONSTANT_ADDRESS
      responses: { '200': { description: OK } }
  /api/health/adscenter:
    get:
      operationId: healthAdscenter
      x-google-backend:
        address: https://adscenter-preview-yt54xvsg5q-an.a.run.app/health
        path_translation: CONSTANT_ADDRESS
      responses: { '200': { description: OK } }
  /api/health/console:
    get:
      operationId: healthConsole
      x-google-backend:
        address: https://console-preview-yt54xvsg5q-an.a.run.app/health
        path_translation: CONSTANT_ADDRESS
      responses: { '200': { description: OK } }

  /api/health/billing:
    get:
      operationId: healthBilling
      x-google-backend:
        address: https://billing-preview-yt54xvsg5q-an.a.run.app/health
        path_translation: CONSTANT_ADDRESS
      responses: { '200': { description: OK } }

  # Health aggregate
  /api/health:
    get:
      operationId: healthAggregate
      x-google-backend:
        address: https://console-preview-yt54xvsg5q-an.a.run.app/health
        path_translation: CONSTANT_ADDRESS
      responses: { '200': { description: OK } }

  # OAuth 回调无需鉴权（由 Google 调用）
  /api/v1/adscenter/oauth/callback:
    get:
      operationId: adscenterOauthCallback
      # 不配置 security 即为公开
      x-google-backend:
        address: https://adscenter-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }

  # Identity service removed; Firebase auth is enforced at gateway.

  /api/v1/billing/tokens/balance:
    get:
      operationId: billingTokensBalance
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://billing-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }
  /api/v1/billing/tokens/transactions:
    get:
      operationId: billingTokensTransactions
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://billing-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }

  # Explicit billing endpoints to avoid wildcard mismatch issues
  /api/v1/billing/tokens/balance:
    get:
      operationId: billingTokensBalance
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://billing-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }
  /api/v1/billing/tokens/transactions:
    get:
      operationId: billingTokensTransactions
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://billing-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }

  /api/v1/offers:
    get:
      operationId: offersList
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://offer-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }
    post:
      operationId: offersCreate
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://offer-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '201': { description: Created } }
  /api/v1/offers/{id}:
    get:
      operationId: offersGet
      security: [ { firebase: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          type: string
      x-google-backend:
        address: https://offer-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }
  /api/v1/offers/{id}/status:
    put:
      operationId: offersUpdateStatus
      security: [ { firebase: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          type: string
      x-google-backend:
        address: https://offer-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }

  /api/v1/siterank/analyze:
    post:
      operationId: siterankAnalyze
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://siterank-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '202': { description: Accepted } }
  /api/v1/siterank/{offerId}:
    get:
      operationId: siterankGetLatest
      security: [ { firebase: [] } ]
      parameters:
        - name: offerId
          in: path
          required: true
          type: string
      x-google-backend:
        address: https://siterank-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }

  /api/v1/batchopen/tasks:
    post:
      operationId: batchopenCreateTask
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://batchopen-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '202': { description: Accepted } }

  /api/v1/adscenter/preflight:
    post:
      operationId: adscenterPreflight
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://adscenter-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }

  # Workflow routes removed in v2.


  # Explicit users endpoints
  /api/v1/console/users:
    get:
      operationId: consoleUsersList
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://console-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }
  /api/v1/console/users/{id}:
    get:
      operationId: consoleUsersGet
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://console-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }
  /api/v1/console/users/{id}/subscription:
    get:
      operationId: consoleUsersSubscriptionGet
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://console-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }
    put:
      operationId: consoleUsersSubscriptionPut
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://console-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }
  /api/v1/console/users/{id}/tokens:
    post:
      operationId: consoleUsersTokensPost
      security: [ { firebase: [] } ]
      x-google-backend:
        address: https://console-preview-yt54xvsg5q-an.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      responses: { '200': { description: OK } }
