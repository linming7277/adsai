openapi: 3.0.3
info:
  title: Billing Service
  version: 0.1.0
  license:
    name: Elastic-Internal
servers:
  - url: /api/v1/billing
paths:
  /tokens/balance:
    get:
      operationId: getTokenBalance
      summary: Get current user's token balance
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance: { type: integer }
                required: [balance]
        '401': { description: Unauthorized }
  /tokens/transactions:
    get:
      operationId: listTokenTransactions
      summary: List token transactions (last 50)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TokenTransaction'
        '401': { description: Unauthorized }
  /subscription:
    get:
      operationId: getSubscription
      summary: Get current subscription
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401': { description: Unauthorized }
        '404': { description: Not Found }
  /tokens/reserve:
    post:
      operationId: reserveTokens
      summary: Reserve tokens for a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer }
                taskId: { type: string }
              required: [amount]
      responses:
        '202': { description: Reserved }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
  /tokens/commit:
    post:
      operationId: commitTokens
      summary: Commit reserved tokens for a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                txId: { type: string }
                amount: { type: integer }
                taskId: { type: string }
              required: [amount]
      responses:
        '200': { description: Committed }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
  /tokens/release:
    post:
      operationId: releaseTokens
      summary: Release previously reserved tokens
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                txId: { type: string }
                amount: { type: integer }
                taskId: { type: string }
              required: [amount]
      responses:
        '200': { description: Released }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }

  /tokens/credit/purchased:
    post:
      operationId: creditPurchasedTokens
      summary: Credit purchased tokens (pool-aware, idempotent)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer, minimum: 1 }
                description: { type: string }
                metadata: { type: object, additionalProperties: true }
              required: [amount]
      responses:
        '200': { description: Credited }
        '401': { description: Unauthorized }

  /tokens/credit/subscription:
    post:
      operationId: creditSubscriptionTokens
      summary: Credit subscription tokens (pool-aware, idempotent)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer, minimum: 1 }
                description: { type: string }
                metadata:
                  type: object
                  additionalProperties: true
                  properties:
                    expiresAt: { type: string, format: date-time }
              required: [amount]
      responses:
        '200': { description: Credited }
        '401': { description: Unauthorized }

  /tokens/consistency:
    get:
      operationId: getTokenConsistency
      summary: Token balance consistency across aggregates
      security:
        - bearerAuth: []
      responses:
        '200': { description: Consistency report }
        '401': { description: Unauthorized }

  /tokens/consistency/plan:
    get:
      operationId: getTokenConsistencyPlan
      summary: Compute consistency repair plan (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: userId
          required: false
          schema: { type: string }
      responses:
        '200': { description: Repair plan JSON }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }

  /tokens/consistency/repair:
    post:
      operationId: postTokenConsistencyRepair
      summary: Apply consistency repair (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: string }
                confirm: { type: boolean }
                dryRun: { type: boolean }
              required: [userId]
      responses:
        '200': { description: Repair applied or dry-run }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }

  /subscriptions/me:
    get:
      operationId: getSubscriptionMe
      summary: Get current user subscription details
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401': { description: Unauthorized }
        '404': { description: Not Found }

  /tokens/usage:
    get:
      operationId: getTokenUsage
      summary: Get token usage summary for current user
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: days
          required: false
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalUsed: { type: integer }
                  dailyUsage: { type: array, items: { type: object } }
        '401': { description: Unauthorized }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Subscription:
      type: object
      properties:
        id: { type: string }
        planName: { type: string }
        status: { type: string }
        currentPeriodEnd: { type: string, format: date-time }
      required: [id, planName, status, currentPeriodEnd]
    TokenTransaction:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        amount: { type: integer }
        description: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, type, amount, createdAt]
