# NOTE: Canonical OpenAPI specs live under specs/openapi/*.yaml
#       This file is a local mirror for reference only and may be stale.
openapi: 3.0.3
info:
  title: Browser Exec Service
  version: 0.1.0
  license:
    name: Elastic-Internal
servers:
  - url: /api/v1/browser
security: []
paths:
  /parse-url:
    post:
      operationId: parseUrl
      summary: Parse URL and extract hostname and brand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
              required: [url]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  hostname: { type: string }
                  brand: { type: string }
  /check-availability:
    post:
      operationId: checkAvailability
      summary: Check URL availability via HTTP HEAD/GET
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
                timeoutMs: { type: integer, minimum: 1000, maximum: 15000 }
                method: { type: string, enum: [HEAD, GET] }
                fingerprint:
                  type: object
                  properties:
                    locale: { type: string }
                    timezoneId: { type: string }
                    viewport:
                      type: object
                      properties: { width: { type: integer }, height: { type: integer } }
                    geolocation:
                      type: object
                      properties: { latitude: { type: number }, longitude: { type: number }, accuracy: { type: number } }
                    colorScheme: { type: string, enum: [light, dark, no-preference] }
                    userAgent: { type: string }
                proxy:
                  type: object
                  properties:
                    server: { type: string }
                    username: { type: string }
                    password: { type: string }
              required: [url]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  engine: { type: string, enum: [playwright, fetch] }
                  timings:
                    type: object
                    properties:
                      navMs: { type: integer }
                      clickMs: { type: integer }
                  error: { type: string }
  /simulate-click:
    post:
      operationId: simulateClick
      summary: Simulate click (queued)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
                selector: { type: string, description: "CSS selector to click first" }
                wait:
                  type: object
                  properties:
                    until: { type: string, enum: [domcontentloaded, networkidle, selector] }
                    selector: { type: string }
                    timeoutMs: { type: integer }
                dwellMs: { type: integer, description: "Wait after click (ms)" }
                fingerprint:
                  $ref: '#/components/schemas/Fingerprint'
                proxy:
                  $ref: '#/components/schemas/Proxy'
              required: [url]
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId: { type: string }
                  status: { type: string }
  /batch-execute:
    post:
      operationId: batchExecute
      summary: Submit tasks for batch execution (queued)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tasks:
                  type: array
                  items:
                    type: object
                    properties:
                      url: { type: string }
                      fingerprint: { $ref: '#/components/schemas/Fingerprint' }
                      proxy: { $ref: '#/components/schemas/Proxy' }
                    required: [url]
                concurrency: { type: integer, minimum: 1, maximum: 8 }
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted: { type: integer }
                  taskGroupId: { type: string }
  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get task status
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [queued, running, completed, failed] }
                  result: { type: object }
                  error: { type: string }
                  groupId: { type: string }
        '404':
          description: Not found
  /resolve-offer:
    post:
      operationId: resolveOffer
      summary: Resolve affiliate offer URL to final landing page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string, description: "Affiliate offer URL to resolve" }
                waitUntil: { type: string, enum: [domcontentloaded, load, networkidle], default: networkidle }
                timeoutMs: { type: integer, minimum: 2000, maximum: 60000, default: 45000 }
                stabilizeMs: { type: integer, minimum: 0, maximum: 5000, default: 1200 }
                headers: { type: object, additionalProperties: { type: string } }
                userAgent: { type: string }
                proxyProviderURL: { type: string, description: "URL to fetch proxy list from" }
              required: [url]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  finalUrl: { type: string }
                  finalUrlSuffix: { type: string }
                  domain: { type: string }
                  brand: { type: string }
                  via: { type: string, enum: [proxy, direct] }
                  chainLength: { type: integer }
                  chain: { type: array, items: { type: string } }
                  timings:
                    type: object
                    properties:
                      navMs: { type: integer }
                      stabilizeMs: { type: integer }
        '400':
          description: Bad request
        '502':
          description: Resolution failed
        '503':
          description: Capacity exhausted
        '504':
          description: Timeout
  /evaluate-offer:
    post:
      operationId: browserEvaluateOffer
      summary: Evaluate offer with optimized resource loading (blocks images/fonts/media)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string, description: "Offer URL to evaluate" }
                targetCountry: { type: string, default: "US", description: "Target country code for proxy selection" }
                waitUntil: { type: string, enum: [domcontentloaded, load, networkidle], default: networkidle }
                timeoutMs: { type: integer, minimum: 2000, maximum: 60000, default: 30000 }
                stabilizeMs: { type: integer, minimum: 0, maximum: 5000, default: 1200 }
                headers: { type: object, additionalProperties: { type: string } }
                userAgent: { type: string }
                proxyProviderURL: { type: string, description: "URL to fetch proxy list from" }
              required: [url]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  finalUrl: { type: string, description: "Final landing page URL" }
                  finalUrlSuffix: { type: string, description: "Query parameters" }
                  domain: { type: string, description: "Domain name" }
                  brandName: { type: string, description: "Extracted brand name" }
                  redirectChain:
                    type: array
                    items:
                      type: object
                      properties:
                        url: { type: string }
                        timestamp: { type: string, format: date-time }
                  htmlSnippet: { type: string, description: "First 50KB of HTML for analysis" }
                  via: { type: string, enum: [proxy, direct] }
                  timings:
                    type: object
                    properties:
                      totalMs: { type: integer }
                      navigationMs: { type: integer }
                      stabilizeMs: { type: integer }
        '400':
          description: Bad request
        '502':
          description: Evaluation failed
        '503':
          description: Capacity exhausted
        '504':
          description: Timeout
  /similarweb:
    post:
      operationId: fetchSimilarWebData
      summary: Fetch domain data from SimilarWeb API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain: { type: string, description: "Domain name to query (e.g., nike.com)" }
                timeoutMs: { type: integer, minimum: 5000, maximum: 30000, default: 20000 }
                retries: { type: integer, minimum: 0, maximum: 3, default: 2 }
                backoffMs: { type: integer, minimum: 100, maximum: 2000, default: 500 }
              required: [domain]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  domain: { type: string }
                  data:
                    type: object
                    properties:
                      global_rank: { type: integer, description: "Global ranking" }
                      category_rank: { type: integer, description: "Category ranking" }
                      top_country_shares:
                        type: array
                        items:
                          type: object
                          properties:
                            country: { type: string }
                            value: { type: number }
                      country_rank: { type: integer }
                      monthly_visits: { type: integer }
                  parseMethod: { type: string, enum: [json, html, none] }
                  via: { type: string, enum: [proxy, direct] }
                  responseTimeMs: { type: integer }
        '400':
          description: Bad request
        '502':
          description: Fetch failed
components:
  schemas:
    Fingerprint:
      type: object
      properties:
        locale: { type: string }
        timezoneId: { type: string }
        viewport:
          type: object
          properties: { width: { type: integer }, height: { type: integer } }
        geolocation:
          type: object
          properties: { latitude: { type: number }, longitude: { type: number }, accuracy: { type: number } }
        colorScheme: { type: string, enum: [light, dark, no-preference] }
        userAgent: { type: string }
    Proxy:
      type: object
      properties:
        server: { type: string }
        username: { type: string }
        password: { type: string }
