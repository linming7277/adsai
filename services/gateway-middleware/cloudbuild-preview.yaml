# Cloud Build configuration for Gateway Middleware (preview environment)
substitutions:
  _SERVICE_NAME: gateway-middleware-preview
  _REGION: asia-northeast1
  _IMAGE_REGISTRY: asia-northeast1-docker.pkg.dev/your-gcp-project-id/adsai-services
  _IMAGE_NAME: gateway-middleware
  _IMAGE_TAG: preview-manual
  _VPC_CONNECTOR: cr-conn-default-ane1
  _COMMIT_SHA: manual

steps:
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=services/gateway-middleware/Dockerfile
      - --destination=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --destination=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:preview-latest
      - --context=.
      - --cache=true
      - --build-arg=COMMIT_SHA=${_COMMIT_SHA}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --cpu=1
      - --memory=512Mi
      - --min-instances=1
      - --max-instances=10
      - --concurrency=80
      - --timeout=30s
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only
      - --set-env-vars=ENV=preview,GIN_MODE=release,CONFIG_PATH=/config/routes.yaml,BILLING_SERVICE_URL=https://billing-preview-yt54xvsg5q-an.a.run.app,LOG_LEVEL=info
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
