# Cloud Build configuration for Gateway Middleware (production environment)
# Unified authentication, authorization, and token management gateway

substitutions:
  _SERVICE_NAME: gateway-middleware-prod
  _REGION: asia-northeast1
  _IMAGE_REGISTRY: asia-northeast1-docker.pkg.dev/your-gcp-project-id/adsai-services
  _IMAGE_NAME: gateway-middleware
  _IMAGE_TAG: prod-${SHORT_SHA}
  _VPC_CONNECTOR: adsai-prod-vpc-connector

steps:
  # Step 1: Build the Docker image using Kaniko
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=services/gateway-middleware/Dockerfile
      - --destination=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --destination=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:prod-latest
      - --context=.
      - --cache=true
      - --cache-ttl=24h
      - --compressed-caching=true
      - --build-arg=COMMIT_SHA=${SHORT_SHA}

  # Step 2: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --cpu=1
      - --memory=1Gi
      - --min-instances=3
      - --max-instances=50
      - --concurrency=100
      - --timeout=60s
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only
      - --set-env-vars=ENV=production,CONFIG_PATH=/app/config/routes.yaml,GIN_MODE=release,REDIS_ADDRESS=10.0.1.3:6379,BILLING_SERVICE_URL=https://billing-prod-1234567890.asia-northeast1.run.app
      - --set-secrets=/secrets/app-secrets/serviceAccountKey=adsai-prod-service-key:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
  sourceProvenanceHash: ['SHA256']

timeout: 1800s
