# Cloud Build configuration for Siterank API service (preview environment)
# Build and deploy the API-only service

substitutions:
  _SERVICE_NAME: siterank-api-preview
  _REGION: asia-northeast1
  _IMAGE_REGISTRY: asia-northeast1-docker.pkg.dev/your-gcp-project-id/adsai-services
  _IMAGE_NAME: siterank-api
  _IMAGE_TAG: preview-${SHORT_SHA}
  _VPC_CONNECTOR: cr-conn-default-ane1

steps:
  # Step 1: Build the Docker image using Kaniko
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=services/siterank/Dockerfile.api
      - --destination=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --destination=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:preview-latest
      - --context=.
      - --cache=true
      - --cache-ttl=24h
      - --compressed-caching=true
      - --build-arg=COMMIT_SHA=${SHORT_SHA}

  # Step 2: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --cpu=0.5
      - --memory=512Mi
      - --min-instances=1
      - --max-instances=10
      - --concurrency=80
      - --timeout=60s
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only
      - --set-env-vars=ENV=preview,SERVICE_MODE=api
      - --set-secrets=/secrets/app-secrets/serviceAccountKey=adsai-preview-service-key:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
  sourceProvenanceHash: ['SHA256']

timeout: 1800s
