# Cloud Build configuration for Siterank Worker service (preview environment)
# Build and deploy the Worker-only service for background task processing

substitutions:
  _SERVICE_NAME: siterank-worker-preview
  _REGION: asia-northeast1
  _IMAGE_REGISTRY: asia-northeast1-docker.pkg.dev/gen-lang-client-0944935873/autoads-services
  _IMAGE_NAME: siterank-worker
  _IMAGE_TAG: preview-${SHORT_SHA}
  _VPC_CONNECTOR: cr-conn-default-ane1

steps:
  # Step 1: Build the Docker image using Kaniko
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=services/siterank/Dockerfile.worker
      - --destination=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --destination=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:preview-latest
      - --context=.
      - --cache=true
      - --cache-ttl=24h
      - --compressed-caching=true
      - --build-arg=COMMIT_SHA=${SHORT_SHA}

  # Step 2: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE_REGISTRY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --cpu=1
      - --memory=1Gi
      - --min-instances=1
      - --max-instances=20
      - --concurrency=1
      - --timeout=600s
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only
      - --set-env-vars=ENV=preview,SERVICE_MODE=worker
      - --set-secrets=/secrets/app-secrets/serviceAccountKey=autoads-preview-service-key:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
  sourceProvenanceHash: ['SHA256']

timeout: 1800s
