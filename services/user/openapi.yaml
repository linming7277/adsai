openapi: 3.0.3
info:
  title: AdsAI User Service API
  description: 统一用户服务API，提供用户档案、权限、Token和订阅管理
  version: 1.0.0
  contact:
    name: AdsAI Team
servers:
  - url: https://user-preview-yt54xvsg5q-an.a.run.app
    description: Preview Environment
  - url: https://user-prod-yt54xvsg5q-an.a.run.app
    description: Production Environment

paths:
  /health:
    get:
      summary: Health check
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/users/{userId}:
    get:
      summary: Get complete user information
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteUserInfo'
        '404':
          description: User not found
        '500':
          description: Internal server error

  /api/v1/users/{userId}/profile:
    get:
      summary: Get user profile
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: User not found
        '500':
          description: Internal server error

    put:
      summary: Update user profile
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
      responses:
        '200':
          description: User profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid request body
        '500':
          description: Internal server error

  /api/v1/users/{userId}/permissions:
    get:
      summary: Get user permissions
      tags:
        - Permissions
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User permissions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPermissions'
        '404':
          description: User not found
        '500':
          description: Internal server error

    post:
      summary: Update user permissions
      tags:
        - Permissions
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPermissionsUpdate'
      responses:
        '200':
          description: User permissions updated successfully
        '400':
          description: Invalid request body
        '403':
          description: Insufficient permissions
        '500':
          description: Internal server error

  /api/v1/users/{userId}/permissions/check:
    get:
      summary: Check specific permission
      tags:
        - Permissions
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: permission
          in: query
          required: true
          schema:
            type: string
            enum: [can_use_ai, can_create_offers, can_manage_ads, can_access_analytics, is_admin]
      responses:
        '200':
          description: Permission check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionCheck'
        '400':
          description: Invalid permission parameter
        '500':
          description: Internal server error

  /api/v1/users/{userId}/tokens/balance:
    get:
      summary: Get token balance
      tags:
        - Tokens
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token balance retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenBalance'
        '404':
          description: User not found
        '500':
          description: Internal server error

  /api/v1/users/{userId}/tokens/reserve:
    post:
      summary: Reserve tokens
      tags:
        - Tokens
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenReservationRequest'
      responses:
        '200':
          description: Tokens reserved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenReservation'
        '400':
          description: Invalid request body or insufficient balance
        '500':
          description: Internal server error

  /api/v1/users/tokens/{reservationId}/confirm:
    post:
      summary: Confirm token reservation
      tags:
        - Tokens
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reservation confirmed successfully
        '404':
          description: Reservation not found
        '500':
          description: Internal server error

  /api/v1/users/tokens/{reservationId}/cancel:
    post:
      summary: Cancel token reservation
      tags:
        - Tokens
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reservation cancelled successfully
        '404':
          description: Reservation not found
        '500':
          description: Internal server error

  /api/v1/users/{userId}/subscription:
    get:
      summary: Get user subscription
      tags:
        - Subscriptions
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User subscription retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          description: User not found
        '500':
          description: Internal server error

  /api/v1/users/{userId}/subscription/upgrade:
    post:
      summary: Upgrade subscription
      tags:
        - Subscriptions
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan:
                  type: string
                  enum: [starter, professional, elite]
              required:
                - plan
      responses:
        '200':
          description: Subscription upgraded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          description: Invalid request body
        '500':
          description: Internal server error

  /api/v1/sync/user/{userId}:
    post:
      summary: Sync user data
      tags:
        - Sync
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                direction:
                  type: string
                  enum: [to_gcp, to_supabase, bidirectional]
              required:
                - direction
      responses:
        '200':
          description: User data synced successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResult'
        '400':
          description: Invalid request body
        '500':
          description: Internal server error

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        service:
          type: string
          example: user-service
        timestamp:
          type: string
          format: date-time

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        photo_url:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, admin]
        onboarded:
          type: boolean
        is_active:
          type: boolean
        organization_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserProfileUpdate:
      type: object
      properties:
        display_name:
          type: string
        photo_url:
          type: string
          nullable: true
        onboarded:
          type: boolean
        organization_id:
          type: string
          format: uuid
          nullable: true

    UserPermissions:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        is_admin:
          type: boolean
        subscription_plan:
          type: string
          enum: [starter, professional, elite]
        can_use_ai:
          type: boolean
        can_create_offers:
          type: boolean
        can_manage_ads:
          type: boolean
        can_access_analytics:
          type: boolean
        max_offers_per_month:
          type: integer
        max_tokens_per_month:
          type: integer
        can_export_data:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserPermissionsUpdate:
      type: object
      properties:
        is_admin:
          type: boolean
        subscription_plan:
          type: string
          enum: [starter, professional, elite]
        can_use_ai:
          type: boolean
        can_create_offers:
          type: boolean
        can_manage_ads:
          type: boolean
        can_access_analytics:
          type: boolean
        max_offers_per_month:
          type: integer
        max_tokens_per_month:
          type: integer
        can_export_data:
          type: boolean

    PermissionCheck:
      type: object
      properties:
        has_permission:
          type: boolean

    TokenBalance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        balance:
          type: integer
        reserved:
          type: integer
        available:
          type: integer
        total_earned:
          type: integer
        total_spent:
          type: integer
        last_updated:
          type: string
          format: date-time

    TokenReservationRequest:
      type: object
      properties:
        amount:
          type: integer
          minimum: 1
        reason:
          type: string
        reference_id:
          type: string
          nullable: true

    TokenReservation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        amount:
          type: integer
        reason:
          type: string
        reference_id:
          type: string
          nullable: true
        status:
          type: string
          enum: [reserved, confirmed, refunded, expired]
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        confirmed_at:
          type: string
          format: date-time
          nullable: true

    Subscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        plan:
          type: string
          enum: [starter, professional, elite]
        status:
          type: string
          enum: [active, cancelled, expired, trial]
        is_trial:
          type: boolean
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        current_period_ends_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        ends_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CompleteUserInfo:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserProfile'
        permissions:
          $ref: '#/components/schemas/UserPermissions'
        token_balance:
          $ref: '#/components/schemas/TokenBalance'
        subscription:
          $ref: '#/components/schemas/Subscription'

    SyncResult:
      type: object
      properties:
        success:
          type: boolean
        direction:
          type: string
          enum: [to_gcp, to_supabase, bidirectional]
        records_synced:
          type: integer
        errors:
          type: array
          items:
            type: string
        duration:
          type: string
          format: duration
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/SyncConflict'

    SyncConflict:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        table:
          type: string
        field:
          type: string
        supabase_value:
          type: object
        gcp_value:
          type: object
        updated_at:
          type: string
          format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []