openapi: 3.0.3
info:
  title: Billing Service
  version: 0.1.0
  license:
    name: Elastic-Internal
servers:
  - url: /api/v1/billing
paths:
  /tokens/balance:
    get:
      operationId: getTokenBalance
      summary: Get current user's token balance
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance: { type: integer }
                required: [balance]
        '401': { description: Unauthorized }
  /tokens/transactions:
    get:
      operationId: listTokenTransactions
      summary: List token transactions (last 50)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TokenTransaction'
        '401': { description: Unauthorized }
  /subscription:
    get:
      operationId: getSubscription
      summary: Get current subscription
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401': { description: Unauthorized }
        '404': { description: Not Found }
  /tokens/reserve:
    post:
      operationId: reserveTokens
      summary: Reserve tokens for a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer }
                taskId: { type: string }
              required: [amount]
      responses:
        '202': { description: Reserved }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
  /tokens/commit:
    post:
      operationId: commitTokens
      summary: Commit reserved tokens for a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                txId: { type: string }
                amount: { type: integer }
                taskId: { type: string }
              required: [amount]
      responses:
        '200': { description: Committed }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
  /tokens/release:
    post:
      operationId: releaseTokens
      summary: Release previously reserved tokens
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                txId: { type: string }
                amount: { type: integer }
                taskId: { type: string }
              required: [amount]
      responses:
        '200': { description: Released }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }

  /tokens/credit/purchased:
    post:
      operationId: creditPurchasedTokens
      summary: Credit purchased tokens (pool-aware, idempotent)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer, minimum: 1 }
                description: { type: string }
                metadata: { type: object, additionalProperties: true }
              required: [amount]
      responses:
        '200': { description: Credited }
        '401': { description: Unauthorized }

  /tokens/credit/subscription:
    post:
      operationId: creditSubscriptionTokens
      summary: Credit subscription tokens (pool-aware, idempotent)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer, minimum: 1 }
                description: { type: string }
                metadata:
                  type: object
                  additionalProperties: true
                  properties:
                    expiresAt: { type: string, format: date-time }
              required: [amount]
      responses:
        '200': { description: Credited }
        '401': { description: Unauthorized }

  /tokens/consistency:
    get:
      operationId: getTokenConsistency
      summary: Token balance consistency across aggregates
      security:
        - bearerAuth: []
      responses:
        '200': { description: Consistency report }
        '401': { description: Unauthorized }

  /tokens/consistency/plan:
    get:
      operationId: getTokenConsistencyPlan
      summary: Compute consistency repair plan (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: userId
          required: false
          schema: { type: string }
      responses:
        '200': { description: Repair plan JSON }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }

  /tokens/consistency/repair:
    post:
      operationId: postTokenConsistencyRepair
      summary: Apply consistency repair (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: string }
                confirm: { type: boolean }
                dryRun: { type: boolean }
              required: [userId]
      responses:
        '200': { description: Repair applied or dry-run }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }

  /subscriptions/me:
    get:
      operationId: getSubscriptionMe
      summary: Get current user subscription details
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401': { description: Unauthorized }
        '404': { description: Not Found }

  /tokens/usage:
    get:
      operationId: getTokenUsage
      summary: Get token usage summary for current user
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: days
          required: false
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalUsed: { type: integer }
                  dailyUsage: { type: array, items: { type: object } }
        '401': { description: Unauthorized }

  # Subscription Configuration Management
  /config/all:
    get:
      operationId: getAllSubscriptionConfig
      summary: Get all subscription configuration (permissions, token costs, pricing)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions: { type: object }
                  tokenCosts: { type: object }
                  pricing: { type: object }
                  version: { type: string }
                  updatedAt: { type: string }
        '401': { description: Unauthorized }

  /config/pricing:
    get:
      operationId: getPricingConfig
      summary: Get subscription pricing configuration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  pricing: { type: object }
        '401': { description: Unauthorized }

  /config/pricing/{plan}:
    put:
      operationId: updatePricingConfig
      summary: Update pricing configuration for a plan
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: plan
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                monthlyPrice: { type: number }
                yearlyPrice: { type: number }
                tokenQuota: { type: integer }
              required: [monthlyPrice, yearlyPrice, tokenQuota]
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan: { type: string }
                  monthlyPrice: { type: number }
                  yearlyPrice: { type: number }
                  tokenQuota: { type: integer }
                  updatedAt: { type: string }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }

  /config/history:
    get:
      operationId: getConfigHistory
      summary: Get configuration change history
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: configType
          required: false
          schema: { type: string }
        - in: query
          name: startDate
          required: false
          schema: { type: string, format: date }
        - in: query
          name: endDate
          required: false
          schema: { type: string, format: date }
        - in: query
          name: changedBy
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/ConfigHistoryItem' }}
                  totalCount: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
        '401': { description: Unauthorized }

  # Trial Subscription Management
  /trial/start:
    post:
      operationId: startTrialSubscription
      summary: Start a trial subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                planType: { type: string, enum: [professional, elite] }
                durationDays: { type: integer, default: 7 }
              required: [planType]
      responses:
        '201':
          description: Trial started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrialSubscription'
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
        '409': { description: Trial already exists }

  /trial/status:
    get:
      operationId: getTrialStatus
      summary: Get current trial subscription status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrialSubscription'
        '401': { description: Unauthorized }
        '404': { description: No trial found }

  /trial/convert:
    post:
      operationId: convertTrialToSubscription
      summary: Convert trial to paid subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                planType: { type: string, enum: [professional, elite] }
                paymentMethodId: { type: string }
              required: [planType, paymentMethodId]
      responses:
        '200':
          description: Converted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
        '404': { description: No trial found }

  # Permission and Token Cost Configuration (Admin endpoints)
  /admin/permissions:
    get:
      operationId: getAllPermissions
      summary: Get all permission configurations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions: { type: object }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }

  /admin/token-costs:
    get:
      operationId: getAllTokenCosts
      summary: Get all token cost configurations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokenCosts: { type: object }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Subscription:
      type: object
      properties:
        id: { type: string }
        planName: { type: string }
        status: { type: string }
        currentPeriodEnd: { type: string, format: date-time }
      required: [id, planName, status, currentPeriodEnd]
    TokenTransaction:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        amount: { type: integer }
        description: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, type, amount, createdAt]
    TrialSubscription:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        planType: { type: string, enum: [professional, elite] }
        status: { type: string, enum: [active, expired, converted] }
        startedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        convertedAt: { type: string, format: date-time }
        tokenQuota: { type: integer }
      required: [id, userId, planType, status, startedAt, expiresAt, tokenQuota]
    ConfigHistoryItem:
      type: object
      properties:
        id: { type: string }
        configType: { type: string }
        configId: { type: string }
        action: { type: string }
        oldValue: { type: object }
        newValue: { type: object }
        changedBy: { type: string }
        changedAt: { type: string, format: date-time }
        changedByEmail: { type: string }
      required: [id, configType, configId, action, newValue, changedAt]
